name: Build Android APK

on:
  push:
    branches:
      - main # تأكد من أن هذا هو اسم الفرع الرئيسي لديك

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (بدون تفعيل الكاش لتجنب الخطأ الظاهر في الصورة)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. بناء ملف الـ APK مباشرة باستخدام Gradle المثبت في النظام
      - name: Build Debug APK
        run: gradle assembleDebug

      # 4. رفع ملف الـ APK لتبقيه متاحاً للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
