name: Build Android APK

on:
  push:
    branches:
      - main # أو master حسب اسم الفرع لديك

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. البحث عن المجلد الذي يحتوي على ملف settings.gradle.kts والبناء من داخله
      - name: Find Gradle Project and Build
        run: |
          GRADLE_DIR=$(find . -name "settings.gradle.kts" -exec dirname {} \;)
          if [ -z "$GRADLE_DIR" ]; then
            echo "خطأ: لم يتم العثور على ملفات إعدادات Gradle في المشروع!"
            exit 1
          fi
          echo "تم العثور على المشروع في المسار: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          gradle assembleDebug

      # 4. رفع ملف الـ APK بعد البناء
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
