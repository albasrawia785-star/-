name: Build Android APK

on:
  push:
    branches:
      - main # أو اسم الفرع الرئيسي لديك مثل master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (Java)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. إعطاء صلاحية التنفيذ لملف gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. بناء ملف الـ APK (نسخة التطوير والتجربة)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. رفع ملف الـ APK لتبقيه متاحاً للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
