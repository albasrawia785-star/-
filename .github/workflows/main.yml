name: Build Android APK

on:
  push:
    branches:
      - main
      - master # تم إضافة master في حال كان مشروعك يرتكز عليه

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. خطوة تشخيصية لرؤية ما يراه السيرفر فعلياً داخل المجلد
      - name: Check Visible Files
        run: |
          echo "=== طباعة الملفات المرفوعة على GitHub ==="
          ls -la
          echo "========================================="

      # 3. إعداد بيئة جافا
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. البحث عن مجلد المشروع والبناء
      - name: Find Gradle Project and Build
        run: |
          GRADLE_DIR=$(find . -name "settings.gradle.kts" -exec dirname {} \;)
          if [ -z "$GRADLE_DIR" ]; then
            echo "خطأ: لم يتم العثور على ملفات إعدادات Gradle في المشروع!"
            exit 1
          fi
          echo "تم العثور على المشروع في: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          gradle assembleDebug

      # 5. رفع ملف الـ APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
