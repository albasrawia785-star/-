name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود والملف المضغوط من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. فك ضغط مشروع الأندرويد تلقائياً داخل السيرفر
      - name: Unzip Project Files
        run: |
          echo "جاري فك ضغط ملف المشروع..."
          unzip -q "*.zip" -d extracted_project
          echo "تم فك الضغط بنجاح!"

      # 3. إعداد بيئة جافا
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. البحث عن مجلد المشروع بعد فكه وبدء البناء
      - name: Find Gradle Project and Build
        run: |
          GRADLE_DIR=$(find . -name "settings.gradle.kts" -exec dirname {} \;)
          if [ -z "$GRADLE_DIR" ]; then
            echo "خطأ: لم يتم العثور على ملفات إعدادات Gradle داخل الملف المضغوط!"
            exit 1
          fi
          echo "تم العثور على المشروع في: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          gradle assembleDebug

      # 5. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
